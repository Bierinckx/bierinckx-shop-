<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop | AURA LUXE</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Space Grotesk', system-ui, sans-serif; background: #FAF9F6; color: #1a1a1a; }
    header {
      background: #FAF9F6;
      border-bottom: 1px solid #e8e0d0;
      padding: 1.5rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo { font-size: 1.5rem; font-weight: 700; letter-spacing: 0.15em; color: #1a1a1a; text-decoration: none; }
    .logo span { color: #8B1A2B; }
    .coming-soon {
      text-align: center;
      padding: 8rem 2rem;
    }
    .coming-soon h1 {
      font-size: 2rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      margin-bottom: 1rem;
    }
    .coming-soon p { color: #777; font-size: 1rem; margin-bottom: 2rem; }
    .badge {
      display: inline-block;
      background: #8B1A2B;
      color: #FAF9F6;
      padding: 0.5rem 1.5rem;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <header>
    <a class="logo" href="/">AURA <span>LUXE</span></a>
  </header>
  <section class="coming-soon">
    <h1>Collectie in opbouw</h1>
    <p>Onze premium collectie wordt binnenkort gelanceerd.<br>Schrijf je in voor vroege toegang.</p>
    <span class="badge">Coming Soon</span>
  </section>
</body>
</html>
